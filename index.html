<style>
  :root {
    --teal: #8ED4D3;
    --navy: #0E3878;
    --yellow: #F8D16C;
    --sang: #378ADD;
    --sang-bg: #E6F1FB;
    --phleg: #EF9F27;
    --phleg-bg: #FAEEDA;
    --melan: #7F77DD;
    --melan-bg: #EEEDFE;
    --chol: #639922;
    --chol-bg: #EAF3DE;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: #fff;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--navy);
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    background: #fff;
  }
  .screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 20px;
    padding-bottom: 100px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .screen.active { opacity: 1; }

  button { font-family: inherit; cursor: pointer; }

  .btn-primary {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    width: 100%;
    min-height: 48px;
  }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-secondary {
    border: 1.5px solid var(--navy);
    color: var(--navy);
    background: transparent;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    width: 100%;
    min-height: 48px;
  }

  /* Progress bar */
  .progress {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
  }
  .progress .seg {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: #eee;
  }
  .progress .seg.filled { background: var(--navy); }

  .question-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 24px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .options.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-btn {
    border: 1.5px solid #e0e0e0;
    background: #fafafa;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 15px;
    color: var(--navy);
    text-align: left;
    min-height: 48px;
  }
  .option-btn.selected { border: 2px solid var(--navy); background: #fff; font-weight: 600; }

  .top-spacer { flex: 1; }

  /* Result screen */
  #screen-result {
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 14px;
  }
  .result-emoji { font-size: 60px; }
  .result-name { font-size: 26px; font-weight: 700; }
  .result-desc { font-size: 15px; opacity: 0.85; max-width: 320px; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 20px; max-width: 320px; }

  /* Home */
  .greeting { font-size: 22px; font-weight: 600; margin-bottom: 20px; }
  .home-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 2px 12px rgba(14,56,120,0.10);
    padding: 20px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 17px;
    font-weight: 600;
  }
  .home-card .icon { font-size: 28px; }
  .banner {
    margin-top: 16px;
    background: var(--teal);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .banner-text { font-size: 14px; font-weight: 500; text-align: center; }

  /* Place card */
  .place-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 2px 16px rgba(14,56,120,0.12);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
  }
  .place-card.has-photo { padding: 0 0 22px; }
  .place-photo {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
  }
  .place-photo-placeholder {
    width: 100%;
    height: 180px;
    background: var(--teal);
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 600;
  }
  .save-star {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.9);
    font-size: 20px;
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .save-star.filled { color: var(--yellow, #F8D16C); }
  .recommend-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--navy);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
  }
  .badge-count {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--red, #E24B4A);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
  .chat-list-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: 1px solid #eee;
    margin-bottom: 10px;
    position: relative;
  }
  .chat-list-unread { background: var(--red, #E24B4A); color: #fff; font-size: 12px; font-weight: 700; min-width: 22px; height: 22px; border-radius: 999px; display: flex; align-items: center; justify-content: center; padding: 0 6px; }
  .vk-suggest-banner {
    background: var(--teal);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 10px;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .place-card.has-photo .place-title,
  .place-card.has-photo .place-sub,
  .place-card.has-photo .place-why,
  .place-card.has-photo .place-duration,
  .place-card.has-photo .place-actions,
  .place-card.has-photo .divider { margin-left: 22px; margin-right: 22px; }
  .place-title { font-size: 20px; font-weight: 700; }
  .place-sub { font-size: 14px; opacity: 0.7; }
  .divider { height: 1px; background: #eee; }
  .place-why { font-size: 15px; line-height: 1.45; }
  .place-duration { font-size: 14px; opacity: 0.7; }
  .place-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

  /* Route card */
  .route-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 2px 16px rgba(14,56,120,0.12);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .route-title { font-size: 20px; font-weight: 700; }
  .route-desc { font-size: 14px; opacity: 0.8; }
  .route-points { display: flex; flex-direction: column; gap: 10px; }
  .route-point { font-size: 15px; line-height: 1.4; }
  .route-point b { color: var(--navy); }
  .route-tip { font-size: 14px; opacity: 0.8; }
  .route-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

  /* Profile */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 999px;
    padding: 10px 18px;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 20px;
  }
  .profile-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
    font-size: 15px;
  }
  .profile-row .label { opacity: 0.6; }
  .name-input {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    color: var(--navy);
    margin-bottom: 16px;
    font-family: inherit;
  }
  .name-input:focus { outline: none; border-color: var(--navy); }
  .saved-empty { text-align: center; opacity: 0.6; font-size: 14px; margin-top: 60px; }

  /* Companions */
  .companion-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 1px solid #eee;
    margin-bottom: 10px;
  }
  .companion-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* Chat */
  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    flex: 1;
    padding: 6px 0;
  }
  .chat-row { display: flex; flex-direction: column; align-items: flex-start; max-width: 80%; }
  .chat-row.mine { align-items: flex-end; align-self: flex-end; }
  .chat-sender { font-size: 11px; opacity: 0.5; margin-bottom: 2px; padding: 0 4px; }
  .chat-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
    cursor: pointer;
  }
  .chat-time { font-size: 10px; opacity: 0.45; margin-top: 3px; padding: 0 4px; }
  .chat-bubble {
    background: #f0f0f0;
    color: var(--navy);
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
  }
  .chat-row.mine .chat-bubble { background: var(--navy); color: #fff; }
  .chat-input-row {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 440px;
    padding: 0 20px;
    display: flex;
    gap: 8px;
    box-sizing: border-box;
  }
  .chat-input {
    flex: 1;
    border: 1.5px solid #e0e0e0;
    border-radius: 999px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
  }
  .chat-input:focus { outline: none; border-color: var(--navy); }
  .chat-send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    border: none;
    font-size: 18px;
    flex-shrink: 0;
  }
  .profile-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }

  /* Avatar */
  .avatar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .avatar-circle {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    position: relative;
  }
  .avatar-photo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    overflow: hidden;
  }
  .avatar-edit-badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    border: 2px solid #fff;
    z-index: 2;
  }
  .avatar-hint { font-size: 12px; opacity: 0.6; }

  /* Bottom nav */
  #bottom-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-top: 1px solid #eee;
    justify-content: space-around;
    padding: 8px 0 16px;
    z-index: 50;
  }
  .nav-btn {
    background: none;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 22px;
    color: #bbb;
    min-height: 48px;
    min-width: 48px;
  }
  .nav-btn span { font-size: 11px; }
  .nav-btn.active { color: var(--navy); }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(14,56,120,0.4);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  #modal-overlay.active { display: flex; }
  .modal-sheet {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }

  /* Toast */
  #toast {
    display: none;
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--navy);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 200;
    max-width: 90%;
    text-align: center;
  }
  #toast.show { display: block; }
</style>
</head>
<body>
<div id="app">

  <!-- SPLASH -->
  <div id="screen-splash" class="screen" style="background:var(--teal); justify-content:center; align-items:center; flex-direction:column; gap:16px;">
    <img src="photos/logo.png" alt="ялла" style="width:160px; height:auto;">
    <div style="font-size:15px; color:var(--navy); opacity:0.8; text-align:center;">выбраться в город — не одному</div>
  </div>

  <!-- LONG TEST (temperament / communication style) -->
  <div id="screen-long-test" class="screen">
    <div class="progress" id="long-test-progress"></div>
    <div id="long-test-steps"></div>
    <div class="top-spacer"></div>
    <button class="btn-secondary" id="long-test-back" style="margin-bottom:10px; display:none;" onclick="longTestPrev()">← Назад</button>
    <button class="btn-primary" id="long-test-next" disabled onclick="longTestNext()">Далее</button>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="result-actions">
      <button class="btn-primary" id="result-btn-short" onclick="goToShortTest()">Пройти короткий тест</button>
      <button class="btn-secondary" onclick="goToAllPlaces()">Смотреть все места</button>
    </div>
  </div>

  <!-- SHORT TEST (place/route preferences) -->
  <div id="screen-onboarding" class="screen">
    <div class="progress" id="onboarding-progress">
      <div class="seg" data-step="1"></div>
      <div class="seg" data-step="2"></div>
      <div class="seg" data-step="3"></div>
      <div class="seg" data-step="4"></div>
    </div>

    <div class="step" id="step-1" style="display:flex; flex-direction:column;">
      <div class="question-title">Какой у тебя сейчас вайб?</div>
      <div class="options" data-question="mood">
        <button class="option-btn" data-value="весёлый">Весёлый</button>
        <button class="option-btn" data-value="грустный">Грустный</button>
        <button class="option-btn" data-value="50/50">50/50</button>
      </div>
    </div>

    <div class="step" id="step-2" style="display:none; flex-direction:column;">
      <div class="question-title">К чему стремишься?</div>
      <div class="options" data-question="goal">
        <button class="option-btn" data-value="расслабиться">Расслабиться</button>
        <button class="option-btn" data-value="отдохнуть">Отдохнуть</button>
        <button class="option-btn" data-value="адреналин">Адреналин</button>
        <button class="option-btn" data-value="весело">Весело провести время</button>
      </div>
    </div>

    <div class="step" id="step-3" style="display:none; flex-direction:column;">
      <div class="question-title">Что ближе?</div>
      <div class="options grid2" data-question="format">
        <button class="option-btn" data-value="прогулка">Прогулка</button>
        <button class="option-btn" data-value="выставка">Выставка</button>
        <button class="option-btn" data-value="лекция">Лекция</button>
        <button class="option-btn" data-value="кафе">Кафе</button>
        <button class="option-btn" data-value="необычное">Необычное</button>
        <button class="option-btn" data-value="кино">Кино</button>
      </div>
    </div>

    <div class="step" id="step-4" style="display:none; flex-direction:column;">
      <div class="question-title">Когда выбираешься?</div>
      <div class="options grid2" data-question="time">
        <button class="option-btn" data-value="утро">Утро</button>
        <button class="option-btn" data-value="день">День</button>
        <button class="option-btn" data-value="вечер">Вечер</button>
        <button class="option-btn" data-value="ночь">Ночь</button>
      </div>
    </div>

    <div class="top-spacer"></div>
    <button class="btn-secondary" id="onboarding-back" style="margin-bottom:10px; display:none;" onclick="onboardingPrev()">← Назад</button>
    <button class="btn-primary" id="onboarding-next" disabled onclick="onboardingNext()">Далее</button>
  </div>

  <!-- ALL PLACES (browsable gallery) -->
  <div id="screen-all-places" class="screen">
    <div id="all-places-container"></div>
  </div>

  <!-- HOME -->
  <div id="screen-home" class="screen">
    <div class="greeting" id="home-greeting">Привет! 👋</div>
    <div class="home-card" onclick="ymGoal('find_place'); goTo('screen-places')">
      <span class="icon">📍</span>
      <span>Найти место</span>
    </div>
    <div class="home-card" onclick="ymGoal('get_route'); goTo('screen-routes')">
      <span class="icon">🗺</span>
      <span>Получить маршрут</span>
    </div>
    <button class="btn-secondary" style="margin-bottom:14px;" onclick="retakeShortTest()">🔄 Пройти тест на места заново</button>
    <div class="banner">
      <div class="banner-text">Ялла скоро запускается как полноценное приложение</div>
      <button class="btn-primary" onclick="earlyAccess()">Хочу ранний доступ</button>
    </div>
  </div>

  <!-- PLACES -->
  <div id="screen-places" class="screen">
    <div id="place-container"></div>
  </div>

  <!-- ROUTES -->
  <div id="screen-routes" class="screen">
    <div id="route-container"></div>
  </div>

  <!-- PROFILE -->
  <div id="screen-profile" class="screen">
    <div id="profile-container"></div>
    <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="onAvatarSelected(event)">
  </div>

  <!-- SAVED PLACES -->
  <div id="screen-saved" class="screen">
    <div id="saved-container"></div>
  </div>

  <!-- MESSAGES (chat list) -->
  <div id="screen-messages" class="screen">
    <div id="messages-container"></div>
  </div>

  <!-- COMPANIONS -->
  <div id="screen-companions" class="screen">
    <div id="companions-container"></div>
  </div>

  <!-- CHAT -->
  <div id="screen-chat" class="screen" style="padding-bottom:90px;">
    <button class="btn-secondary" id="chat-back-btn" style="margin-bottom:12px;" onclick="goTo('screen-messages')">← Назад</button>
    <div style="margin-bottom:10px;">
      <div id="chat-title" style="font-size:17px; font-weight:600;"></div>
      <div id="chat-subtitle" style="font-size:12px; opacity:0.6;"></div>
    </div>
    <div id="chat-vk-suggest"></div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-row">
      <input id="chat-input" class="chat-input" type="text" placeholder="Написать сообщение..." onkeydown="if(event.key==='Enter') sendChatMessage()">
      <button class="chat-send-btn" onclick="sendChatMessage()">→</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->

<script>
if (window.vkBridge) {
  vkBridge.send('VKWebAppInit')
}

function ymGoal(name, params) {
  if (window.ym) ym(109965863, 'reachGoal', name, params || {})
}

/* ---------- API / VK IDENTITY ---------- */

const API_BASE_URL = 'https://alla-vasilisaelisvasilisa.amvera.io'

let vkUserId = null
let isRealVkUser = false

async function initVkUser() {
  if (window.vkBridge) {
    try {
      const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 1500))
      const info = await Promise.race([vkBridge.send('VKWebAppGetUserInfo'), timeout])
      vkUserId = info.id
      isRealVkUser = true
      const profile = load('profile', {})
      let profileChanged = false
      if (!profile.name) {
        const fullName = [info.first_name, info.last_name].filter(Boolean).join(' ')
        if (fullName) {
          profile.name = fullName
          profileChanged = true
        }
      }
      if (profileChanged) save('profile', profile)
      const existingAvatar = load('avatar', null)
      const vkPhoto = info.photo_200 || info.photo_100 || info.photo_max_orig
      if (!existingAvatar && vkPhoto) {
        save('avatar', vkPhoto)
      }
    } catch (e) {
      vkUserId = null
    }
  }
  if (!vkUserId) {
    // Браузер вне ВК — для разработки используем стабильный локальный ID
    vkUserId = load('local_uid', null)
    if (!vkUserId) {
      vkUserId = Math.floor(Math.random() * 1e9)
      save('local_uid', vkUserId)
    }
  }
}

async function apiCall(path, options = {}) {
  try {
    const res = await fetch(API_BASE_URL + path, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    })
    if (!res.ok) {
      showToast('Ошибка сервера: ' + res.status)
      return null
    }
    return await res.json()
  } catch (e) {
    showToast('Нет связи с сервером: ' + e.message)
    return null
  }
}

function captureSource() {
  // Метка источника передаётся через #метка в ссылке, например
  // vk.com/app54641404#instagram — сохраняется один раз, при первом визите
  const existing = load('source', null)
  if (existing) return
  const hash = location.hash.replace('#', '').trim()
  if (!hash) return
  save('source', hash)
  if (window.ym) ym(109965863, 'params', { source: hash })
  ymGoal('visit_source_' + hash)
}

async function syncProfileToApi() {
  if (!vkUserId) return
  const profile = load('profile', {})
  await apiCall('/api/profile', {
    method: 'POST',
    body: JSON.stringify({
      vk_user_id: vkUserId,
      name: profile.name || null,
      temperament: profile.temperament || null,
      axis_scores: profile.axisScores || null,
      source: load('source', null),
      mood: profile.mood || null,
      goal: profile.goal || null,
      format: profile.format || null,
      time_pref: profile.time || null,
      avatar: load('avatar', null),
      is_real_vk: isRealVkUser,
    }),
  })
}

/* ---------- STORAGE ---------- */

function save(key, value) {
  localStorage.setItem('yalla_' + key, JSON.stringify(value))
}

function load(key, fallback) {
  try {
    const v = JSON.parse(localStorage.getItem('yalla_' + key))
    return v === null || v === undefined ? fallback : v
  } catch { return fallback }
}

let longTestStep = 0
const longTestAnswers = []

function renderLongTestStep() {
  const q = LONG_TEST[longTestStep]
  const progress = document.getElementById('long-test-progress')
  progress.innerHTML = LONG_TEST.map((_, i) =>
    `<div class="seg${i <= longTestStep ? ' filled' : ''}"></div>`
  ).join('')

  const stepsEl = document.getElementById('long-test-steps')
  const currentScore = longTestAnswers[longTestStep]
  stepsEl.innerHTML = `
    <div class="question-title">${q.title}</div>
    <div class="options">
      ${q.options.map((o, i) => `<button class="option-btn${o.score === currentScore ? ' selected' : ''}" data-index="${i}">${o.label}</button>`).join('')}
    </div>
  `
  stepsEl.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      stepsEl.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'))
      btn.classList.add('selected')
      longTestAnswers[longTestStep] = q.options[parseInt(btn.dataset.index)].score
      document.getElementById('long-test-next').disabled = false
    })
  })
  document.getElementById('long-test-next').disabled = longTestAnswers[longTestStep] === undefined
  document.getElementById('long-test-back').style.display = longTestStep > 0 ? 'block' : 'none'
}

function longTestPrev() {
  if (longTestStep > 0) {
    longTestStep--
    renderLongTestStep()
  }
}

function longTestNext() {
  if (longTestStep < LONG_TEST.length - 1) {
    longTestStep++
    renderLongTestStep()
  } else {
    const axisScores = { energy:0, spontaneity:0, pace:0, directness:0, emotion:0 }
    LONG_TEST.forEach((q, i) => { axisScores[q.axis] += longTestAnswers[i] })

    const scoreSanguine = axisScores.energy + axisScores.spontaneity
    const scorePhlegmatic = -axisScores.energy - axisScores.pace
    const scoreMelancholic = -axisScores.energy + axisScores.emotion
    const scoreCholeric = axisScores.directness + axisScores.pace

    const ranked = [
      ['sanguine', scoreSanguine],
      ['phlegmatic', scorePhlegmatic],
      ['melancholic', scoreMelancholic],
      ['choleric', scoreCholeric],
    ].sort((a, b) => b[1] - a[1])
    const temperament = ranked[0][0]

    const profile = load('profile', {})
    profile.temperament = temperament
    profile.axisScores = axisScores
    save('profile', profile)
    syncProfileToApi()
    ymGoal('long_test_completed', { temperament })
    showResult(temperament)
  }
}

function startLongTest() {
  longTestStep = 0
  longTestAnswers.length = 0
  showScreen('screen-long-test')
  renderLongTestStep()
}

/* ---------- TEMPERAMENT ---------- */

function getTemperament(profile) {
  if (profile.temperament) return profile.temperament
  if (profile.goal === 'адреналин') return 'choleric'
  if (profile.mood === 'грустный' && profile.goal === 'расслабиться') return 'melancholic'
  if (profile.mood === 'весёлый' && profile.goal === 'весело') return 'sanguine'
  return 'phlegmatic'
}

let currentStep = 1
const answers = {}

document.querySelectorAll('.options').forEach(group => {
  group.addEventListener('click', (e) => {
    const btn = e.target.closest('.option-btn')
    if (!btn) return
    group.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'))
    btn.classList.add('selected')
    answers[group.dataset.question] = btn.dataset.value
    document.getElementById('onboarding-next').disabled = false
  })
})

function updateProgress() {
  document.querySelectorAll('#onboarding-progress .seg').forEach(seg => {
    seg.classList.toggle('filled', parseInt(seg.dataset.step) <= currentStep)
  })
}
updateProgress()

function onboardingPrev() {
  if (currentStep > 1) {
    document.getElementById('step-' + currentStep).style.display = 'none'
    currentStep--
    document.getElementById('step-' + currentStep).style.display = 'flex'
    updateProgress()
    document.getElementById('onboarding-next').disabled = false
    document.getElementById('onboarding-back').style.display = currentStep > 1 ? 'block' : 'none'
  }
}

function onboardingNext() {
  if (currentStep < 4) {
    document.getElementById('step-' + currentStep).style.display = 'none'
    currentStep++
    document.getElementById('step-' + currentStep).style.display = 'flex'
    updateProgress()
    const stepEl = document.getElementById('step-' + currentStep)
    const q = stepEl.querySelector('.options').dataset.question
    document.getElementById('onboarding-next').disabled = !answers[q]
    document.getElementById('onboarding-back').style.display = currentStep > 1 ? 'block' : 'none'
  } else {
    const profile = load('profile', {})
    profile.mood = answers.mood
    profile.goal = answers.goal
    profile.format = answers.format
    profile.time = answers.time
    profile.onboarding_done = true
    save('profile', profile)
    syncProfileToApi()
    const previousPlaceId = currentPlace ? currentPlace.id : null
    currentPlace = getNextPlace(previousPlaceId)
    placesTabFormat = ''
    currentRouteId = null
    ymGoal('short_test_completed')
    finishOnboarding('screen-home')

}

/* ---------- PLACES ---------- */

function getNextPlace(excludeId) {
  const profile = load('profile', {})
  const seen = load('seen', [])
  let filtered = PLACES.filter(p =>
    (!profile.format || p.format === profile.format) &&
    (!profile.time || p.time.includes(profile.time)) &&
    (!profile.mood || p.mood.includes(profile.mood))
  ).filter(p => !seen.includes(p.id))
  if (filtered.length === 0) {
    save('seen', [])
    filtered = PLACES
  }
  if (excludeId) {
    const withoutCurrent = filtered.filter(p => p.id !== excludeId)
    if (withoutCurrent.length > 0) filtered = withoutCurrent
  }
  return filtered[Math.floor(Math.random() * filtered.length)]
}

function placePhotoHtml(p) {
  return p.photo
    ? `<img class="place-photo" src="${p.photo}" alt="${p.name}">`
    : `<div class="place-photo-placeholder">${p.name.charAt(0)}</div>`
}

function isSaved(id) {
  return load('saved', []).includes(id)
}

function saveStarHtml(id) {
  const filled = isSaved(id)
  return `<button class="save-star${filled ? ' filled' : ''}" onclick="toggleSavePlace('${id}', event)">${filled ? '★' : '☆'}</button>`
}

function toggleSavePlace(id, event) {
  if (event) event.stopPropagation()
  const saved = load('saved', [])
  const idx = saved.indexOf(id)
  if (idx === -1) {
    saved.push(id)
    showToast('Сохранено в избранное')
    syncSavedPlace(id, true)
  } else {
    saved.splice(idx, 1)
    syncSavedPlace(id, false)
  }
  save('saved', saved)
  const btn = event && event.target
  if (btn && btn.classList.contains('save-star')) {
    btn.textContent = idx === -1 ? '★' : '☆'
    btn.classList.toggle('filled', idx === -1)
  }
}

        <button class="btn-primary" onclick="likePlaceById('${p.id}')">Нравится</button>
        ${opts.recommended ? `<button class="btn-secondary" onclick="rerollRecommendation()">Показать другое</button>` : ''}

  renderPlacesTab()

function renderPlacesTab() {
  const formats = [...new Set(PLACES.map(p => p.format))]
  const filtersHtml = `
    <button class="option-btn${placesTabFormat === '' ? ' selected' : ''}" style="display:inline-block; width:auto; margin:0 6px 6px 0; padding:8px 14px;" onclick="setPlacesTabFilter('')">Все</button>
    ${formats.map(f => `<button class="option-btn${placesTabFormat === f ? ' selected' : ''}" style="display:inline-block; width:auto; margin:0 6px 6px 0; padding:8px 14px;" onclick="setPlacesTabFilter('${f}')">${f}</button>`).join('')}
  `

  let recommendedHtml = ''
  let listPlaces = PLACES
  if (placesTabFormat === '') {
    if (!currentPlace) currentPlace = getNextPlace()
    recommendedHtml = placeCardHtml(currentPlace, { recommended: true })
    listPlaces = PLACES.filter(p => p.id !== currentPlace.id)
  } else {
    listPlaces = PLACES.filter(p => p.format === placesTabFormat)
  }

  document.getElementById('place-container').innerHTML = `
    <div class="question-title" style="font-size:20px; margin-bottom:14px;">Места</div>
    <div style="display:flex; flex-wrap:wrap; margin-bottom:16px;">${filtersHtml}</div>
    ${recommendedHtml}

function setPlacesTabFilter(format) {

function syncSavedPlace(id, added) {
  if (!vkUserId) return
  apiCall(added ? '/api/saved-places/add' : '/api/saved-places/remove', {
    method: 'POST',
    body: JSON.stringify({ vk_user_id: vkUserId, place_id: id }),
  })
}

function likePlaceById(id) {
  const seen = load('seen', [])
  if (!seen.includes(id)) {
    seen.push(id)
    save('seen', seen)
  }
  const saved = load('saved', [])
  if (!saved.includes(id)) {
    saved.push(id)
    save('saved', saved)
    syncSavedPlace(id, true)
  }
  showToast('Сохранили в сохранённые места')
  ymGoal('save_place', { place_id: id })
}

function formatChatTime(createdAt) {
  const d = new Date(createdAt.replace(' ', 'T') + 'Z')
  if (isNaN(d.getTime())) return ''
  const now = new Date()
  const sameDay = d.toDateString() === now.toDateString()
  return sameDay
    ? d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
    : d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' })
}

async function renderMessagesList() {
  const container = document.getElementById('messages-container')
  container.innerHTML = `
    <div class="question-title" style="font-size:20px; margin-bottom:14px;">Сообщения</div>
    <div id="messages-list">Загружаем...</div>
  `
  if (!vkUserId) return
  const data = await apiCall(`/api/my-chats?vk_user_id=${vkUserId}`)
  const chats = (data && data.chats) || []
  const listEl = document.getElementById('messages-list')
  if (!listEl) return
  if (chats.length === 0) {
    listEl.innerHTML = `<div class="saved-empty">Пока нет ни одного чата. Отметь «Хочу туда» на каком-нибудь месте и начни переписку с попутчиками.</div>`
    return
  }
  listEl.innerHTML = chats.map(c => {
    const place = PLACES.find(p => p.id === c.place_id)
    const placeName = c.place_name || (place ? place.name : c.place_id)
    const safePlaceName = placeName.replace(/'/g, "\\'")
    const title = c.type === 'private' ? (c.peer_name || 'Личная переписка') : placeName
    const subtitlePrefix = c.type === 'private' ? `${placeName} · ` : ''
    const onclickArgs = c.type === 'private'
      ? `'${c.place_id}', '${safePlaceName}', '${c.go_date}', ${c.peer_user_id}, '${(c.peer_name || '').replace(/'/g, "\\'")}'`
      : `'${c.place_id}', '${safePlaceName}', '${c.go_date}'`
    return `
    <div class="chat-list-row" onclick="openChatForRoom(${onclickArgs})">
      ${c.type === 'private' ? `<div class="companion-avatar" style="background:#eee; color:#888; width:36px; height:36px; font-size:14px;">${(c.peer_name || '?').charAt(0).toUpperCase()}</div>` : `<div class="companion-avatar" style="background:var(--teal); color:var(--navy); width:36px; height:36px; font-size:16px;">👥</div>`}

        <div style="font-size:14px; font-weight:600;">${title}</div>
        <div style="font-size:12px; opacity:0.6; margin-top:2px;">${subtitlePrefix}${c.last_message_sender || ''}: ${c.last_message_text}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px; opacity:0.5; margin-bottom:4px;">${formatChatTime(c.last_message_time)}</div>

    </div>

  const badge = document.getElementById('messages-badge')

  if (totalUnread > 0) {
    badge.textContent = totalUnread
    badge.style.display = 'flex'
  } else {
    badge.style.display = 'none'
  }
}

async function refreshMessagesBadge() {

        <div class="companion-avatar" style="background:${t ? t.bg : '#eee'}; color:${t ? t.color : '#888'};">${t ? t.emoji : initials}</div>
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:500;">${c.name || 'Без имени'}</div>
          <div style="font-size:12px; opacity:0.6;">${t ? t.name : 'Темперамент неизвестен'}</div>
        </div>
        ${matchHtml}
        <div style="font-size:12px; color:var(--navy); font-weight:500; margin-left:8px;">Лично →</div>
      </div>
    `
  }).join('') + `<button class="btn-primary" style="margin-top:16px;" onclick="openGroupChat()">💬 Общий чат места</button>`
}

let chatBackTarget = 'screen-companions'
let currentChatPeerId = null
let currentChatPeerName = null

function openGroupChat() {
  currentChatPeerId = null
  currentChatPeerName = null
  chatBackTarget = 'screen-companions'
  goTo('screen-chat')
}

function openPrivateChat(peerId, peerName) {
  currentChatPeerId = peerId
  currentChatPeerName = peerName
  chatBackTarget = 'screen-companions'
  ymGoal('open_private_chat', { peer_id: peerId })
  goTo('screen-chat')
}

function openChatForRoom(placeId, placeName, goDate, peerId, peerName) {
  activeCompanionRoom = { placeId, placeName, goDate }
  currentChatPeerId = peerId || null
  currentChatPeerName = peerName || null
  chatBackTarget = 'screen-messages'
  goTo('screen-chat')
}

/* ---------- CHAT ---------- */

let chatLastId = 0
let chatPollTimer = null
let chatVkSuggestShown = false
let chatTotalCount = 0

function renderChatHeader() {
  if (!activeCompanionRoom) return
  if (currentChatPeerId) {
    document.getElementById('chat-title').textContent = currentChatPeerName || 'Личная переписка'
    document.getElementById('chat-subtitle').textContent = `${activeCompanionRoom.placeName} · ${activeCompanionRoom.goDate}`
  } else {
    document.getElementById('chat-title').textContent = activeCompanionRoom.placeName
    document.getElementById('chat-subtitle').textContent = `${activeCompanionRoom.goDate} · общий чат`
  }
  const backBtn = document.getElementById('chat-back-btn')
  backBtn.onclick = () => goTo(chatBackTarget)
}

function formatMessageTime(createdAt) {
  // created_at приходит как 'YYYY-MM-DD HH:MM:SS' (UTC из SQLite)
  const d = new Date(createdAt.replace(' ', 'T') + 'Z')
  if (isNaN(d.getTime())) return ''
  return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
}

function renderChatMessages(messages) {
  const list = document.getElementById('chat-messages')
  messages.forEach(m => {
    const mine = m.vk_user_id === vkUserId
    const t = TYPES[m.sender_temperament] || null
    const initials = (m.sender_name || '?').charAt(0).toUpperCase()
    const safeName = (m.sender_name || 'Гость').replace(/'/g, "\\'")
    const avatarHtml = !mine
      ? `<div class="chat-avatar" style="background:${t ? t.bg : '#eee'}; color:${t ? t.color : '#888'};" onclick="openPrivateChat(${m.vk_user_id}, '${safeName}')">${t ? t.emoji : initials}</div>`
      : ''
    const row = document.createElement('div')
    row.className = 'chat-row' + (mine ? ' mine' : '')
    row.innerHTML = `
      <div style="display:flex; align-items:flex-end; gap:6px;">
        ${avatarHtml}
        <div>
          ${!mine ? `<div class="chat-sender">${m.sender_name || 'Гость'}</div>` : ''}
          <div class="chat-bubble">${m.text}</div>
        </div>
      </div>
      <div class="chat-time">${formatMessageTime(m.created_at)}</div>
    `
    list.appendChild(row)
    chatLastId = Math.max(chatLastId, m.id)
    chatTotalCount++
  })
  list.scrollTop = list.scrollHeight
}

function chatQueryParams() {
  const { placeId, goDate } = activeCompanionRoom
  let q = `place_id=${encodeURIComponent(placeId)}&go_date=${encodeURIComponent(goDate)}`
  if (currentChatPeerId) q += `&peer_user_id=${currentChatPeerId}&viewer_id=${vkUserId}`
  return q
}

async function pollChat() {
  if (!activeCompanionRoom) return
  const data = await apiCall(`/api/chat?${chatQueryParams()}&after_id=${chatLastId}`)
  if (data && data.messages && data.messages.length) {
    renderChatMessages(data.messages)
    markCurrentChatRead()
    if (currentChatPeerId) maybeShowVkSuggest()
  }
}

async function maybeShowVkSuggest() {
  if (chatVkSuggestShown || !currentChatPeerId || chatTotalCount < 3) return
  chatVkSuggestShown = true
  // Проверяем, что у собеседника настоящий VK ID, а не тестовый локальный —
  // иначе ссылка может случайно увести на профиль совершенно незнакомого человека
  const data = await apiCall(`/api/profile?vk_user_id=${currentChatPeerId}`)
  const peerIsReal = data && data.profile && data.profile.is_real_vk
  if (!peerIsReal) {
    document.getElementById('chat-vk-suggest').innerHTML = `
      <div class="vk-suggest-banner">
        <span>Вы уже неплохо пообщались! Продолжайте общение здесь, в приложении 🙂</span>
      </div>
    `
    return
  }
  document.getElementById('chat-vk-suggest').innerHTML = `
    <div class="vk-suggest-banner">
      <span>Вы уже неплохо пообщались! Теперь можно продолжить напрямую в ВК.</span>
      <a href="https://vk.com/id${currentChatPeerId}" target="_blank" class="btn-secondary" style="text-align:center; text-decoration:none; display:block;">Открыть профиль ${currentChatPeerName || ''} в ВК</a>
    </div>
  `
}

function markCurrentChatRead() {
  if (!activeCompanionRoom || !vkUserId) return
  const { placeId, goDate } = activeCompanionRoom
  apiCall('/api/chat/read', {
    method: 'POST',
    body: JSON.stringify({
      vk_user_id: vkUserId,
      place_id: placeId,
      go_date: goDate,
      peer_user_id: currentChatPeerId || null,
    }),
  })
}

async function startChatPolling() {
  stopChatPolling()
  chatLastId = 0
  chatTotalCount = 0
  chatVkSuggestShown = false
  document.getElementById('chat-messages').innerHTML = ''
  document.getElementById('chat-vk-suggest').innerHTML = ''
  renderChatHeader()
  await pollChat()
  markCurrentChatRead()
  chatPollTimer = setInterval(pollChat, 3000)
}

function stopChatPolling() {
  if (chatPollTimer) clearInterval(chatPollTimer)
  chatPollTimer = null
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input')
  const text = input.value.trim()
  if (!text || !activeCompanionRoom) return
  input.value = ''
  const profile = load('profile', {})
  const { placeId, goDate } = activeCompanionRoom
  await apiCall('/api/chat', {
    method: 'POST',
    body: JSON.stringify({
      vk_user_id: vkUserId,
      sender_name: profile.name || 'Гость',
      place_id: placeId,
      go_date: goDate,
      text,
      peer_user_id: currentChatPeerId || null,
    }),
  })
  ymGoal(currentChatPeerId ? 'chat_message_private' : 'chat_message_group')
  pollChat()
}

/* ---------- TOAST ---------- */

let toastTimer = null
function showToast(text) {
  const toast = document.getElementById('toast')
  toast.textContent = text
  toast.classList.add('show')

  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000)

/* ---------- ROUTES ---------- */

let currentRouteId = null

function getRoute() {
  const profile = load('profile', {})
  const matching = ROUTES.filter(r =>
    r.time === profile.time && r.mood.includes(profile.mood)
  )
  const pool = matching.length > 0 ? matching : ROUTES
  let choices = pool.filter(r => r.id !== currentRouteId)
  // Если под текущий вайб+время есть только один маршрут, на "Другой маршрут"
  // показываем случайный из всех остальных, а не повторяем тот же самый
  if (choices.length === 0) {
    choices = ROUTES.filter(r => r.id !== currentRouteId)
  }
  const finalPool = choices.length > 0 ? choices : pool
  return finalPool[Math.floor(Math.random() * finalPool.length)]
}

function rerollRoute() {
  ymGoal('show_another_route')
  renderRoute()
}

function renderRoute() {
  const r = getRoute()
  currentRouteId = r.id
  const pointsHtml = r.points.map((pt, i) => `
    <div class="route-point"><b>${i + 1}. ${pt.name}</b> — ${pt.desc}</div>
  `).join('')
  document.getElementById('route-container').innerHTML = `
    <div class="route-card">
      <div class="route-title">🗺 ${r.name}</div>
      <div class="route-desc">${r.desc} ⏱ ${r.duration}</div>
      <div class="divider"></div>
      <div class="route-points">${pointsHtml}</div>
      <div class="divider"></div>
      <div class="route-tip">💡 ${r.tip}</div>
      <div class="route-actions">
        <button class="btn-primary" onclick="shareRoute('${r.id}')">Поделиться</button>
        <button class="btn-secondary" onclick="rerollRoute()">Другой маршрут</button>
      </div>
    </div>
  `
}

function copyTextFallback(text) {
  const textarea = document.createElement('textarea')
  textarea.value = text
  textarea.style.position = 'fixed'
  textarea.style.opacity = '0'
  document.body.appendChild(textarea)
  textarea.focus()
  textarea.select()
  let ok = false
  try {
    ok = document.execCommand('copy')
  } catch (e) {
    ok = false
  }
  document.body.removeChild(textarea)
  return ok
}

async function shareText(text, successMessage) {
  if (navigator.share) {
    try {
      await navigator.share({ title: 'Ялла', text })
      return
    } catch (e) {
      // пользователь отменил или Share API недоступен — пробуем буфер обмена
    }
  }

  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text)
      showToast(successMessage)
      return
    }
  } catch (e) {
    // переходим к запасному варианту
  }

  if (copyTextFallback(text)) {
    showToast(successMessage)
  } else {
    showToast('Не удалось скопировать')
  }
}

async function shareRoute(routeId) {
  const route = ROUTES.find(r => r.id === routeId)
  if (!route) return
  const pointsText = route.points.map((pt, i) => `${i + 1}. ${pt.name} — ${pt.desc}`).join('\n')
  const text = `Маршрут «${route.name}» от Ялла\n${route.desc}\n\n${pointsText}\n\n💡 ${route.tip}`
  ymGoal('share_route', { route_id: routeId })
  await shareText(text, 'Маршрут скопирован')
}

async function sharePlace(placeId) {
  const place = PLACES.find(p => p.id === placeId)
  if (!place) return
  const text = `«${place.name}» от Ялла\n🚇 ${place.district}, м. ${place.metro}\n\n${place.why}\n\n⏱ ${place.duration}`
  ymGoal('share_place', { place_id: placeId })
  await shareText(text, 'Место скопировано')
}

/* ---------- PROFILE ---------- */

function renderProfile() {
  const profile = load('profile', {})
  const type = getTemperament(profile)
  const t = TYPES[type]
  const avatar = load('avatar', null)
  const avatarStyle = avatar
    ? `background-image:url('${avatar}'); background-color:${t.bg};`
    : `background-color:${t.bg};`
  document.getElementById('profile-container').innerHTML = `
    <div class="avatar-wrap">
      <div class="avatar-circle" onclick="document.getElementById('avatar-input').click()">
        <div class="avatar-photo-inner" style="${avatarStyle}">${avatar ? '' : t.emoji}</div>
        <div class="avatar-edit-badge">✎</div>
      </div>
      <div class="avatar-hint">Нажми, чтобы поставить своё фото</div>
    </div>
    <input id="name-input" class="name-input" type="text" placeholder="Как тебя зовут?" value="${profile.name || ''}" maxlength="30" oninput="onNameChange(this.value)">
    <div class="badge" style="background:${t.bg}; color:${t.color};">${t.emoji} ${t.name}</div>
    <div class="profile-row"><span class="label">Вайб</span><span>${profile.mood || '—'}</span></div>
    <div class="profile-row"><span class="label">Стремление</span><span>${profile.goal || '—'}</span></div>
    <div class="profile-row"><span class="label">Формат</span><span>${profile.format || '—'}</span></div>
    <div class="profile-row"><span class="label">Время</span><span>${profile.time || '—'}</span></div>
    <div class="profile-row"><span class="label">Сохранённые места</span><span>${load('saved', []).length}</span></div>
    <div class="profile-actions">
      <button class="btn-secondary" onclick="goTo('screen-messages')" style="position:relative;">💬 Сообщения<span id="messages-badge" class="badge-count" style="display:none;"></span></button>
      <button class="btn-secondary" onclick="goTo('screen-saved')">⭐ Сохранённые места</button>
      <button class="btn-primary" onclick="retakeShortTest()">Обновить предпочтения</button>
      <button class="btn-secondary" onclick="earlyAccess()">Хочу ранний доступ</button>
      <button class="btn-secondary" onclick="openSupportModal()">🆘 Поддержка</button>
      <button class="btn-secondary" onclick="resetEverything()" style="color:#999; border-color:#ddd;">Удалить мои данные</button>
    </div>
  `
  refreshMessagesBadge()
}

function onAvatarSelected(event) {
  const file = event.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = () => {
    save('avatar', reader.result)
    renderProfile()
  }
  reader.readAsDataURL(file)
}

let confirmModalAction = null

function showConfirmModal(text, action) {
  document.getElementById('confirm-modal-text').textContent = text
  confirmModalAction = action
  document.getElementById('confirm-modal-overlay').style.display = 'flex'
}

function closeConfirmModal() {
  document.getElementById('confirm-modal-overlay').style.display = 'none'
  confirmModalAction = null
}

function confirmModalYes() {
  const action = confirmModalAction
  closeConfirmModal()
  if (action) action()
}

function resetEverything() {
  showConfirmModal(
    'Удалить все твои данные в приложении (тесты, имя, фото, сохранённые места)? Это нельзя отменить.',
    () => {
      localStorage.removeItem('yalla_profile')
      localStorage.removeItem('yalla_avatar')
      localStorage.removeItem('yalla_seen')
      localStorage.removeItem('yalla_saved')
      localStorage.removeItem('yalla_early_access')
      document.getElementById('bottom-nav').style.display = 'none'
      location.reload()
    }
  )
}

function retakeShortTest() {
  document.querySelectorAll('#screen-onboarding .option-btn').forEach(b => b.classList.remove('selected'))
  for (const k in answers) delete answers[k]
  currentStep = 1
  document.querySelectorAll('.step').forEach(s => s.style.display = 'none')
  document.getElementById('step-1').style.display = 'flex'
  document.getElementById('onboarding-next').disabled = true
  document.getElementById('onboarding-back').style.display = 'none'
  updateProgress()
  showScreen('screen-onboarding')
}

/* ---------- EARLY ACCESS ---------- */

async function earlyAccess() {
  save('early_access', true)
  const result = await apiCall('/api/early-access', {
    method: 'POST',
    body: JSON.stringify({ vk_user_id: vkUserId }),
  })
  if (!result) return // apiCall уже показал тост с причиной ошибки
  showToast('Записали! Сообщим при запуске 🎉')

}

/* ---------- SUPPORT ---------- */

function openSupportModal() {
  document.getElementById('support-text').value = ''
  document.getElementById('support-modal-overlay').style.display = 'flex'
}

function closeSupportModal() {
  document.getElementById('support-modal-overlay').style.display = 'none'
}

function closeSupportModalOnOverlay(e) {
  if (e.target.id === 'support-modal-overlay') closeSupportModal()
}

async function submitSupport() {
  const text = document.getElementById('support-text').value.trim()
  if (!text) return
  const profile = load('profile', {})
  closeSupportModal()
  const result = await apiCall('/api/support', {
    method: 'POST',
    body: JSON.stringify({ vk_user_id: vkUserId, name: profile.name || null, text }),
  })
  if (result) {
    showToast('Спасибо! Мы получили обращение')
    ymGoal('support_message')
  }
}

/* ---------- INIT ---------- */

let profile = {}

async function restoreFromServerIfNeeded() {
  // localStorage внутри VK-вебвью (iframe на vk.com) — контекст третьей стороны,
  // браузеры всё чаще стирают его там. Раньше восстановление пропускалось, если
  // локально уже был пройден тест — но тогда один и тот же VK-аккаунт на двух
  // устройствах никогда не сходился (разные цвета темперамента на телефоне и
  // компьютере). Теперь при настоящем VK ID сервер — источник правды.
  if (!vkUserId || !isRealVkUser) return
  const data = await apiCall(`/api/profile?vk_user_id=${vkUserId}`)
  if (!data) return
  const p = data.profile
  if (p && p.temperament) {
    profile.temperament = p.temperament
    if (p.axis_scores) {
      try { profile.axisScores = JSON.parse(p.axis_scores) } catch (e) {}
    }
    if (p.name) profile.name = p.name
    if (p.mood && p.goal && p.format && p.time_pref) {
      profile.mood = p.mood
      profile.goal = p.goal
      profile.format = p.format
      profile.time = p.time_pref
      profile.onboarding_done = true
    }
    save('profile', profile)
    if (p.avatar && !load('avatar', null)) save('avatar', p.avatar)
  }
  if (data.saved && data.saved.length) {
    const localSaved = load('saved', [])
    const merged = Array.from(new Set([...localSaved, ...data.saved]))
    save('saved', merged)
  }
}

async function boot() {
  showScreen('screen-splash')

  try {
    profile = load('profile', {}) || {}
    if (profile.temperament && TYPES[profile.temperament]) applyTheme(profile.temperament)
  } catch (e) {
    // Повреждённые данные от старой версии приложения — начинаем с чистого листа,
    // а не зависаем на заставке навсегда
    localStorage.removeItem('yalla_profile')
    profile = {}
  }

  try { captureSource() } catch (e) { /* не критично для запуска */ }

  try {
    await initVkUser()
    await restoreFromServerIfNeeded()
    syncProfileToApi()
  } catch (e) { /* не критично — vkUserId подстрахован таймаутом внутри initVkUser */ }

  try {
    if (profile.onboarding_done) {
      setTimeout(() => {
        document.getElementById('bottom-nav').style.display = 'flex'
        goTo('screen-home')
      }, 1000)
    } else if (profile.temperament) {
      setTimeout(() => showScreen('screen-onboarding'), 1000)
    } else {
      setTimeout(startLongTest, 1000)
    }
  } catch (e) {
    // Последняя страховка: если даже это упало — сбрасываем всё и стартуем тест заново
    localStorage.removeItem('yalla_profile')
    setTimeout(startLongTest, 1000)
  }
}

boot()
